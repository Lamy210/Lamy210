name: Update Private Technology Summary

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * 0"
  push:
    branches:
      - main
      - master
    paths-ignore:
      - README.md

permissions:
  contents: write

concurrency:
  group: update-private-tech-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-private-tech:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update redacted private technology summary
        if: vars.PRIVATE_TECH_SUMMARY_MODE == 'redacted'
        env:
          PRIVATE_TECH_SUMMARY_MODE: redacted
        run: node --experimental-strip-types scripts/update-private-tech-summary.ts

      - name: Update private language summary
        if: vars.PRIVATE_TECH_SUMMARY_MODE != 'redacted'
        env:
          PRIVATE_TECH_SUMMARY_MODE: languages
          PRIVATE_TECH_PINNED_LANGUAGES: Rust,Go
          PRIVATE_REPO_STATS_TOKEN: ${{ secrets.PRIVATE_REPO_STATS_TOKEN }}
        run: node --experimental-strip-types scripts/update-private-tech-summary.ts

      - name: Commit README update
        shell: bash
        run: |
          set +x

          if git diff --quiet -- README.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update private technology summary [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
